<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Eburon mobile app">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <!-- The above 4 meta tags *must* come first in the head; any other head content must come *after* these tags -->

  <meta name="theme-color" content="#0134d4">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">

  <!-- Title -->
  <title>Eburon App</title>

  <!-- Favicon -->
  <link rel="icon" href="assets/brand/eburon.svg">
  <link rel="apple-touch-icon" href="assets/brand/eburon.svg">

  <!-- Style CSS -->
  <link rel="stylesheet" href="style.css">

  <!-- Web App Manifest -->
  <link rel="manifest" href="manifest.json">
</head>

<body>
  <!-- Preloader -->
  <div id="preloader">
    <div class="spinner-grow text-primary" role="status">
      <span class="visually-hidden">Loading...</span>
    </div>
  </div>

  <!-- Back Button -->
  <div class="login-back-button">
    <a href="hero-blocks.html">
      <i class="ti ti-arrow-left"></i>
    </a>
  </div>

  <!-- Login Wrapper Area -->
  <div class="login-wrapper d-flex align-items-center justify-content-center">
    <div class="custom-container">
      <div class="text-center px-4">
        <img class="login-intro-img" src="assets/img/bg-img/36.png" alt="">
      </div>

      <!-- Register Form -->
      <div class="register-form mt-4">
        <h2 class="mb-3 text-center">Log in to continue</h2>

        <form action="home.html">
          <div class="form-group">
            <input class="form-control" type="text" id="username" placeholder="Username">
          </div>

          <div class="form-group position-relative">
            <input class="form-control" id="psw-input" type="password" placeholder="Enter Password">
            <div class="position-absolute" id="password-visibility">
              <i class="ti ti-eye"></i>
              <i class="ti ti-eye-off"></i>
            </div>
          </div>

          <button class="btn btn-primary w-100" type="submit">Sign In <i class="ti ti-arrow-right"></i></button>
        </form>
      </div>

      <!-- Login Meta -->
      <div class="login-meta-data text-center">
        <a class="stretched-link forgot-password d-block mt-3 mb-1" href="forget-password.html">Forgot
          Password?</a>
        <p class="mb-0">Didn't have an account? <a class="stretched-link" href="register.html">Register Now</a></p>
      </div>
    </div>
  </div>

  <!-- All JavaScript Files -->
  <script src="assets/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/slideToggle.min.js"></script>
  <script src="assets/js/internet-status.js"></script>
  <script src="assets/js/tiny-slider.js"></script>
  <script src="assets/js/venobox.min.js"></script>
  <script src="assets/js/countdown.js"></script>
  <script src="assets/js/rangeslider.min.js"></script>
  <script src="assets/js/vanilla-dataTables.min.js"></script>
  <script src="assets/js/index.js"></script>
  <script src="assets/js/imagesloaded.pkgd.min.js"></script>
  <script src="assets/js/isotope.pkgd.min.js"></script>
  <script src="assets/js/nice-select2.js"></script>
  <script src="assets/js/dark-rtl.js"></script>
  <script src="assets/js/active.js"></script>
  <script src="assets/js/pwa.js"></script>
</body>

</html>
